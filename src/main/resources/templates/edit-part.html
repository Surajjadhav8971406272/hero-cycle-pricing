<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Edit Part</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container">

<h1>Edit Part</h1>

<form action="/parts/update" method="post">

<input type="hidden" name="id" th:value="${part.id}"> <div class="form-group">
<label>Part Name</label>

<input type="text" name="name" th:value="${part.name}">
</div>

<div class="form-group">

<label>Price</label>

<input
type="number" name="price" th:value="${part.price}"></div>
<button class="btn">Update</button>

<a th:href="@{/}" class="btn">Home</a>
</form>
</div>
</body>
</html>
