<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Manage Cycles</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="container">

<h1>Manage Cycles</h1>

<a
th:href="@{/cycles/add}"
class="btn">

Add Cycle

</a>

<a
th:href="@{/}"
class="btn">

Home

</a>

<br><br>

<table>

<thead>

<tr>

<th>ID</th>

<th>Cycle Name</th>

<th>Action</th>

</tr>

</thead>

<tbody>

<tr th:each="cycle:${cycles}">

<td th:text="${cycle.id}"></td>

<td th:text="${cycle.name}"></td>

<td>

<div class="action-buttons">

<a
th:href="'/cycles/edit?id='+${cycle.id}"
class="edit-btn">

Edit

</a>

<a
th:href="'/cycles/delete?id='+${cycle.id}"
class="delete-btn">

Delete

</a>

</div>

</td>

</tr>

</tbody>

</table>

</div>

</body>

</html>
