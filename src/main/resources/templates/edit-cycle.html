<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Edit Cycle</title>

<link rel="stylesheet" th:href="@{/css/style.css}">

</head>

<body>

<div class="form-container">

<h2>Edit Cycle</h2>

<form action="/cycles/update" method="post">

<input
type="hidden"
name="id"
th:value="${cycle.id}">

<div class="form-group">

<label>Cycle Name</label>

<input
type="text"
name="name"
th:value="${cycle.name}">

</div>

<button class="btn">

Update

</button>

<a th:href="@{/cycles}" class="btn">

Back

</a>

</form>

</div>

</body>

</html>
